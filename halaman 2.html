    <style>
        body { font-family: sans-serif; background-color: #87CEEB; padding: 20px; text-align: center; }
        
        /* Judul & Alamat */
        .header { color: white; margin-bottom: 30px; }
        .header h1 { margin-top: 5px; margin-bottom: 5px; }
        .header h2 { margin-bottom: 5px; }
        .header p { margin-top: 0; }

        /* Pencarian */
        .search-container { margin-bottom: 30px; }
        #search { padding: 10px; width: 250px; border-radius: 20px; border: none; }
        .btn-search { padding: 10px 20px; border-radius: 20px; border: none; background: #FFD700; cursor: pointer; }

        /* Grid */
        .container { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 20px; max-width: 600px; margin: 0 auto; 
        }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .foto-siswa { width: 100%; height: 180px; background: #eee; display: block; margin-bottom: 10px; object-fit: cover; border-radius: 10px; }
        
        /* Teks Data */
        .nama-siswa { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .data-text { margin: 3px 0; font-size: 14px; text-align: left; }
        .label { font-weight: bold; }

        /* Navigasi */
        .nav-btn { margin-top: 30px; margin-bottom: 30px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: white; }
    </style>

        ];

        let halamanSekarang = 0;
        const perHalaman = 2;

        function renderData(data = semuaSiswa) {
            const container = document.getElementById('data-container');
            container.innerHTML = "";
            document.getElementById('page-num').innerText = halamanSekarang + 1;

            const start = halamanSekarang * perHalaman;
            const end = start + perHalaman;
            const dataTampil = data.slice(start, end);

            dataTampil.forEach(s => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${s.foto}" class="foto-siswa" alt="${s.nama}">
                        <div class="nama-siswa">${s.nama}</div>
                        <div class="data-text"><span class="label">SRN:</span> ${s.srn}</div>
                        <div class="data-text"><span class="label">Level:</span> ${s.level}</div>
                        <div class="data-text"><span class="label">Place of Birth:</span> ${s.pob}</div>
                        <div class="data-text"><span class="label">Date of Birth:</span> ${s.dob}</div>
                    </div>
                `;
            });
        }

        function cariSiswa() {
            const keyword = document.getElementById('search').value.toLowerCase();
            const hasil = semuaSiswa.filter(s => s.nama.toLowerCase().includes(keyword));
            halamanSekarang = 0;
            renderData(hasil);
        }

        function changePage(arah) {
            const totalHalaman = Math.ceil(semuaSiswa.length / perHalaman);
            halamanSekarang += arah;
            if (halamanSekarang < 0) halamanSekarang = 0;
            if (halamanSekarang >= totalHalaman) halamanSekarang = totalHalaman - 1;
            renderData();
        }

        renderData();
    </script>
